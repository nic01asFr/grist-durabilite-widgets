<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyse Fick — Profils chlorures</title>

  <link rel="stylesheet" href="assets/shared-styles.css">
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <script src="assets/grist-helpers.js"></script>

  <style>
    #chart { width: 100%; min-height: 340px; border-radius: 8px; overflow: hidden; }
    .param-group input[type="number"] { width: 80px; }
    #direct-input-card .param-group input[type="number"] { width: 120px; }
  </style>
</head>
<body>

  <div class="header">
    <h1><span class="icon">📊</span> Analyse Fick</h1>
    <div class="status" id="status">
      <span class="dot"></span>
      <span id="status-text">Chargement Pyodide…</span>
    </div>
  </div>

  <div id="empty-state" class="empty-state">
    <div class="icon">🧪</div>
    <h3>En attente de données</h3>
    <p>Sélectionnez une <strong>mesure</strong> (MEASUREMENT) liée à un profil Cl⁻ (result_type=curve, test=cl_profil).</p>
  </div>

  <div id="main-content" style="display:none">

    <div class="card">
      <div class="card-title">Contexte</div>
      <div class="info-grid" id="context-info"></div>
    </div>

    <div class="card">
      <div class="card-title">Mode d'entrée</div>
      <div class="mode-selector">
        <button class="mode-btn active" id="mode-profile" onclick="setMode('profile')">
          📈 Profil de chlorures
        </button>
        <button class="mode-btn" id="mode-direct" onclick="setMode('direct')">
          🔢 Saisie directe Dapp
        </button>
      </div>
    </div>

    <div class="card" id="chart-card">
      <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
        <span>Profil de chlorures</span>
        <span id="nb-points" style="font-size:11px; color:var(--text-dim); text-transform:none; letter-spacing:0;"></span>
      </div>
      <div id="chart"></div>
    </div>

    <div class="card" id="fitting-controls-card">
      <div class="card-title">Paramètres de fitting</div>
      <div class="param-row" style="margin-bottom:12px;">
        <div class="param-group">
          <label>Seuil Cl⁻ critique :</label>
          <input type="number" id="seuil-cl" value="0.4" step="0.05" min="0.05" max="2.0">
          <label>% liant</label>
        </div>
        <div class="param-group">
          <label>Enrobage :</label>
          <input type="number" id="enrobage" value="50" step="5" min="10" max="120">
          <label>mm</label>
        </div>
        <div class="param-group">
          <label>Age :</label>
          <input type="number" id="age-jours" value="365" step="1" min="1">
          <label>jours</label>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="btn-fit" disabled onclick="runFitting()">
          ⚙️ Lancer le fitting
        </button>
        <button class="btn btn-secondary" id="btn-save" disabled onclick="saveResults()">
          💾 Enregistrer
        </button>
      </div>
    </div>

    <div class="card" id="direct-input-card" style="display:none">
      <div class="card-title">Saisie directe des paramètres</div>
      <div class="param-row" style="margin-bottom:12px;">
        <div class="param-group">
          <label>Dapp :</label>
          <input type="number" id="direct-dapp" step="1e-13" value="1e-12">
          <label>m²/s</label>
        </div>
        <div class="param-group">
          <label>Cs :</label>
          <input type="number" id="direct-cs" step="0.1" value="3.0">
          <label>% liant</label>
        </div>
        <div class="param-group">
          <label>Âge :</label>
          <input type="number" id="direct-age" step="1" value="365" style="width:80px">
          <label>jours</label>
        </div>
      </div>
      <div class="param-row" style="margin-bottom:12px;">
        <div class="param-group">
          <label>Seuil Cl⁻ critique :</label>
          <input type="number" id="direct-seuil" value="0.4" step="0.05" min="0.05" max="2.0">
          <label>% liant</label>
        </div>
        <div class="param-group">
          <label>Enrobage :</label>
          <input type="number" id="direct-enrobage" value="50" step="5" min="10" max="120">
          <label>mm</label>
        </div>
      </div>
      <div class="controls">
        <button class="btn btn-primary" id="btn-calc-direct" disabled onclick="calcDirect()">
          ⚙️ Calculer durée de vie
        </button>
        <button class="btn btn-secondary" id="btn-save-direct" disabled onclick="saveResults()">
          💾 Enregistrer
        </button>
      </div>
    </div>

    <div class="card" id="results-card" style="display:none">
      <div class="card-title">Résultats</div>
      <div class="info-grid" id="results-info"></div>
    </div>

    <div class="card">
      <div class="card-title">Journal</div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    // =========================================================================
    // STATE
    // =========================================================================
    let pyodide = null;
    let pyodideReady = false;
    let currentMeasurement = null;  // MEASUREMENT record (from onRecord)
    let currentMaterial   = null;   // MATERIAL fields
    let currentMix        = null;   // MIX_DESIGN fields
    let currentExposure   = null;   // EXPOSURE fields
    let currentProfilePoints = null; // [{x: depth_mm, y: chloride_pct}]
    let lastFitResult = null;
    let gristReady = false;
    let currentMode = 'profile';

    // =========================================================================
    // MODE SWITCHING
    // =========================================================================
    function setMode(mode) {
      currentMode = mode;
      document.getElementById('mode-profile').classList.toggle('active', mode === 'profile');
      document.getElementById('mode-direct').classList.toggle('active', mode === 'direct');
      document.getElementById('chart-card').style.display = mode === 'profile' ? '' : 'none';
      document.getElementById('fitting-controls-card').style.display = mode === 'profile' ? '' : 'none';
      document.getElementById('direct-input-card').style.display = mode === 'direct' ? '' : 'none';
      lastFitResult = null;
      document.getElementById('results-card').style.display = 'none';
      GristHelpers.log(`Mode : ${mode === 'profile' ? 'Profil de chlorures' : 'Saisie directe Dapp'}`);
      updateUI();
    }

    // =========================================================================
    // PYODIDE INIT
    // =========================================================================
    async function initPyodide() {
      GristHelpers.log('Chargement de Pyodide (Python WASM)…');
      try {
        pyodide = await loadPyodide();
        GristHelpers.log('Pyodide chargé ✓', 'ok');
        GristHelpers.log('Chargement numpy + scipy…');
        await pyodide.loadPackage(['numpy', 'scipy']);
        GristHelpers.log('numpy + scipy chargés ✓', 'ok');
        pyodideReady = true;
        updateUI();
        GristHelpers.log('Prêt pour le fitting.', 'ok');
      } catch (err) {
        GristHelpers.log('Erreur Pyodide : ' + err.message, 'err');
        GristHelpers.setStatus('Erreur Pyodide', 'error');
      }
    }

    // =========================================================================
    // GRIST CONNECTION — Select By MEASUREMENT
    // =========================================================================
    function initGrist() {
      grist.ready({
        requiredAccess: 'full',
        columns: [
          { name: 'id_material',      title: 'Matériau' },
          { name: 'sample_type',      title: "Type d'échantillon" },
          { name: 'id_source',        title: 'Source' },
          { name: 'preparation_date', title: 'Date préparation' },
        ]
      });

      grist.onRecord(async function(record) {
        GristHelpers.log(`Mesure sélectionnée : id=${record.id}`);
        currentMeasurement = record;
        lastFitResult = null;
        document.getElementById('results-card').style.display = 'none';

        await fetchContext(record);
        await fetchResults(record.id);
        showContext();
        updateUI();
      });

      gristReady = true;
      GristHelpers.log('Connecté à Grist ✓', 'ok');
    }

    // =========================================================================
    // FETCH CONTEXT — MATERIAL + MIX_DESIGN + EXPOSURE
    // =========================================================================
    async function fetchContext(measurement) {
      currentMaterial = null;
      currentMix = null;
      currentExposure = null;
      if (!measurement.id_material) return;
      try {
        const [materials, mixes, exposures] = await Promise.all([
          GristHelpers.fetchAllRecords('MATERIAL'),
          GristHelpers.fetchAllRecords('MIX_DESIGN'),
          GristHelpers.fetchAllRecords('EXPOSURE'),
        ]);
        const mat = materials.find(m => m.id === measurement.id_material);
        currentMaterial = mat ? mat.fields : null;
        if (currentMaterial) {
          const mix = mixes.find(m => m.id === currentMaterial.id_mix_design);
          currentMix = mix ? mix.fields : null;
          const expo = exposures.find(e => e.id === currentMaterial.id_exposure);
          currentExposure = expo ? expo.fields : null;
          GristHelpers.log(`Matériau : ${currentMaterial.name || 'id=' + measurement.id_material}`, 'ok');
        }
      } catch (err) {
        GristHelpers.log('Erreur fetch contexte : ' + err.message, 'err');
      }
    }

    // =========================================================================
    // FETCH PROFILE — RESULT(curve, cl_profil) → CURVE → DATA_CURVE
    // =========================================================================
    async function fetchResults(measurementId) {
      currentProfilePoints = null;
      try {
        const [tests, results, curves, dataPoints] = await Promise.all([
          GristHelpers.fetchAllRecords('TEST'),
          GristHelpers.fetchAllRecords('RESULT'),
          GristHelpers.fetchAllRecords('CURVE'),
          GristHelpers.fetchAllRecords('DATA_CURVE'),
        ]);

        const clTest = tests.find(t => t.fields.name === 'cl_profil');
        if (!clTest) {
          GristHelpers.log('Aucun test "cl_profil" trouvé dans la table TEST', 'warn');
          return;
        }

        const curveResult = results.find(r =>
          r.fields.id_measurement === measurementId &&
          r.fields.result_type === 'curve' &&
          r.fields.id_test === clTest.id
        );
        if (!curveResult) {
          GristHelpers.log('Aucun profil Cl⁻ (result_type=curve, test=cl_profil) pour cette mesure', 'warn');
          Plotly.purge('chart');
          return;
        }

        const curve = curves.find(c => c.fields.id_result === curveResult.id);
        if (!curve) {
          GristHelpers.log('Métadonnées de courbe (CURVE) introuvables', 'warn');
          return;
        }

        // Infill age from TEST.experiment_duration if available
        if (clTest.fields.experiment_duration) {
          document.getElementById('age-jours').value = clTest.fields.experiment_duration;
        }

        const points = dataPoints
          .filter(p => p.fields.id_curve === curve.id && p.fields.x != null && p.fields.y != null)
          .sort((a, b) => a.fields.x - b.fields.x)
          .map(p => ({ x: p.fields.x, y: p.fields.y }));

        currentProfilePoints = points;
        GristHelpers.log(`${points.length} points (${curve.fields.x_name || 'x'} vs ${curve.fields.y_name || 'y'})`, points.length > 2 ? 'ok' : 'warn');

        if (points.length > 0) {
          plotProfile(points);
        } else {
          GristHelpers.log('Courbe vide — aucun point DATA_CURVE', 'warn');
          Plotly.purge('chart');
        }
      } catch (err) {
        GristHelpers.log('Erreur fetch profil : ' + err.message, 'err');
      }
    }

    // =========================================================================
    // DISPLAY CONTEXT
    // =========================================================================
    function showContext() {
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';

      const mat  = currentMaterial  || {};
      const mix  = currentMix       || {};
      const expo = currentExposure  || {};
      const fields = [
        { label: 'Matériau',          value: mat.name          || '—' },
        { label: 'Type matériau',     value: mat.material_type || '—' },
        { label: 'E/C',               value: mix.wc_ratio != null ? mix.wc_ratio.toFixed(2) : '—' },
        { label: "Type d'exposition", value: expo.exposure_type   || '—' },
        { label: 'Nature exposition', value: expo.exposure_nature || '—' },
      ];
      document.getElementById('context-info').innerHTML = fields.map(f => `
        <div class="info-item">
          <div class="label">${f.label}</div>
          <div class="value">${f.value}</div>
        </div>
      `).join('');
    }

    // =========================================================================
    // PLOT PROFILE
    // =========================================================================
    function plotProfile(points, fitData = null) {
      const x = points.map(p => p.x);
      const y = points.map(p => p.y);

      document.getElementById('nb-points').textContent = `${points.length} points`;

      const traces = [{
        x, y,
        mode: 'markers', type: 'scatter', name: 'Mesures',
        marker: { color: '#3b82f6', size: 9, line: { color: '#1e3a5f', width: 1.5 } }
      }];

      if (fitData) {
        traces.push({
          x: fitData.x_fit, y: fitData.y_fit,
          mode: 'lines', type: 'scatter',
          name: `Fick (R²=${fitData.R2.toFixed(4)})`,
          line: { color: '#f59e0b', width: 2.5, shape: 'spline' }
        });
        const seuil = parseFloat(document.getElementById('seuil-cl').value);
        traces.push({
          x: [0, Math.max(...x) * 1.1], y: [seuil, seuil],
          mode: 'lines', type: 'scatter', name: `Seuil = ${seuil}`,
          line: { color: '#ef4444', width: 1.5, dash: 'dash' }
        });
        const enrobage = parseFloat(document.getElementById('enrobage').value);
        traces.push({
          x: [enrobage, enrobage], y: [0, Math.max(...y) * 1.1],
          mode: 'lines', type: 'scatter', name: `Enrobage = ${enrobage} mm`,
          line: { color: '#22c55e', width: 1.5, dash: 'dot' }
        });
      }

      Plotly.newPlot('chart', traces, GristHelpers.plotlyDarkLayout({
        xaxis: GristHelpers.plotlyDarkAxis('Profondeur (mm)'),
        yaxis: GristHelpers.plotlyDarkAxis('Cl⁻ (% liant)')
      }), { responsive: true, displayModeBar: true, modeBarButtonsToRemove: ['lasso2d', 'select2d'], displaylogo: false });
    }

    // =========================================================================
    // FICK FITTING — MODE PROFIL
    // =========================================================================
    async function runFitting() {
      if (!pyodideReady || !currentProfilePoints || currentProfilePoints.length < 3) {
        GristHelpers.log('Il faut Pyodide + au moins 3 points de profil', 'warn');
        return;
      }

      const btn = document.getElementById('btn-fit');
      btn.disabled = true;
      btn.textContent = '⏳ Calcul en cours…';
      GristHelpers.log('Lancement du fitting Fick…');

      try {
        const x_mm    = currentProfilePoints.map(p => p.x);
        const y_vals  = currentProfilePoints.map(p => p.y);
        const age_jours = parseFloat(document.getElementById('age-jours').value) || 365;
        const seuil   = parseFloat(document.getElementById('seuil-cl').value);
        const enrobage = parseFloat(document.getElementById('enrobage').value);

        pyodide.globals.set('x_mm_js',       pyodide.toPy(x_mm));
        pyodide.globals.set('y_vals_js',      pyodide.toPy(y_vals));
        pyodide.globals.set('age_jours_js',   age_jours);
        pyodide.globals.set('seuil_js',       seuil);
        pyodide.globals.set('enrobage_mm_js', enrobage);

        const resultJson = pyodide.runPython(`
import numpy as np
from scipy.optimize import curve_fit
from scipy.special import erfc, erfcinv
import json

x_mm = np.array(list(x_mm_js), dtype=float)
y = np.array(list(y_vals_js), dtype=float)
age_jours = float(age_jours_js)
seuil = float(seuil_js)
enrobage_mm = float(enrobage_mm_js)

x_m = x_mm / 1000.0
t_s = age_jours * 86400.0

def fick_model(x, Cs, Dapp):
    arg = x / (2.0 * np.sqrt(Dapp * t_s))
    return Cs * erfc(arg)

try:
    popt, pcov = curve_fit(
        fick_model, x_m, y,
        p0=[max(y) * 1.1, 1e-12],
        bounds=([0, 1e-15], [100, 1e-8]),
        maxfev=20000
    )
    Cs_fit, Dapp_fit = popt
    y_pred = fick_model(x_m, *popt)
    SS_res = np.sum((y - y_pred)**2)
    SS_tot = np.sum((y - np.mean(y))**2)
    R2 = 1.0 - SS_res / SS_tot if SS_tot > 0 else 0.0
    RMSE = np.sqrt(np.mean((y - y_pred)**2))
    x_fit_m = np.linspace(0, max(x_m) * 1.2, 100)
    y_fit = fick_model(x_fit_m, *popt)

    enrobage_m = enrobage_mm / 1000.0
    ratio = seuil / Cs_fit
    if 0 < ratio < 1:
        inv_val = erfcinv(ratio)
        if inv_val > 0:
            t_life_s = (enrobage_m / (2.0 * inv_val))**2 / Dapp_fit
            duree_vie_ans = t_life_s / (365.25 * 86400)
        else:
            duree_vie_ans = float('inf')
    else:
        duree_vie_ans = float('inf') if ratio >= 1 else 0.0

    prof_crit_mm = 2.0 * erfcinv(ratio) * np.sqrt(Dapp_fit * t_s) * 1000 if 0 < ratio < 1 else 0.0

    result = {
        "success": True, "Cs": float(Cs_fit), "Dapp": float(Dapp_fit),
        "R2": float(R2), "RMSE": float(RMSE),
        "duree_vie_ans": float(duree_vie_ans) if duree_vie_ans != float('inf') else -1,
        "profondeur_crit_mm": float(prof_crit_mm),
        "x_fit": (x_fit_m * 1000).tolist(), "y_fit": y_fit.tolist(),
        "age_jours": int(age_jours), "seuil": float(seuil), "enrobage_mm": float(enrobage_mm)
    }
except Exception as e:
    result = {"success": False, "error": str(e)}

json.dumps(result)
        `);

        const fit = JSON.parse(resultJson);
        if (!fit.success) {
          GristHelpers.log('Échec du fitting : ' + fit.error, 'err');
          btn.disabled = false; btn.textContent = '⚙️ Lancer le fitting';
          return;
        }

        lastFitResult = fit;
        lastFitResult.source = 'fitting';
        GristHelpers.log(`Fitting : Cs=${fit.Cs.toFixed(3)}, Dapp=${fit.Dapp.toExponential(2)}, R²=${fit.R2.toFixed(4)}`, 'ok');
        GristHelpers.log(`Durée de vie : ${fit.duree_vie_ans > 0 ? fit.duree_vie_ans.toFixed(1) + ' ans' : '∞'}`, 'ok');

        plotProfile(currentProfilePoints, fit);
        showResults(fit);
        document.getElementById('btn-save').disabled = false;
      } catch (err) {
        GristHelpers.log('Erreur fitting : ' + err.message, 'err');
      }

      btn.disabled = false;
      btn.textContent = '⚙️ Lancer le fitting';
    }

    // =========================================================================
    // DIRECT CALCULATION — MODE DIRECT
    // =========================================================================
    async function calcDirect() {
      if (!pyodideReady) { GristHelpers.log('Pyodide pas encore prêt…', 'warn'); return; }

      const dapp    = parseFloat(document.getElementById('direct-dapp').value);
      const cs      = parseFloat(document.getElementById('direct-cs').value);
      const ageJours = parseFloat(document.getElementById('direct-age').value) || 365;
      const seuil   = parseFloat(document.getElementById('direct-seuil').value);
      const enrobage = parseFloat(document.getElementById('direct-enrobage').value);

      if (isNaN(dapp) || dapp <= 0) { GristHelpers.log('Dapp invalide', 'err'); return; }
      if (isNaN(cs)   || cs   <= 0) { GristHelpers.log('Cs invalide', 'err'); return; }

      const btn = document.getElementById('btn-calc-direct');
      btn.disabled = true; btn.textContent = '⏳ Calcul…';
      GristHelpers.log(`Calcul direct : Dapp=${dapp.toExponential(2)}, Cs=${cs}`);

      try {
        pyodide.globals.set('dapp_js',        dapp);
        pyodide.globals.set('cs_js',          cs);
        pyodide.globals.set('age_jours_js',   ageJours);
        pyodide.globals.set('seuil_js',       seuil);
        pyodide.globals.set('enrobage_mm_js', enrobage);

        const resultJson = pyodide.runPython(`
import json, numpy as np
from scipy.special import erfcinv

dapp = float(dapp_js); cs = float(cs_js)
age_jours = float(age_jours_js); seuil = float(seuil_js)
enrobage_mm = float(enrobage_mm_js)
enrobage_m = enrobage_mm / 1000.0
t_s = age_jours * 86400.0

ratio = seuil / cs
if 0 < ratio < 1:
    inv_val = erfcinv(ratio)
    if inv_val > 0:
        t_life_s = (enrobage_m / (2.0 * inv_val))**2 / dapp
        duree_vie_ans = t_life_s / (365.25 * 86400)
        prof_crit_mm = 2.0 * inv_val * np.sqrt(dapp * t_s) * 1000
    else:
        duree_vie_ans = -1; prof_crit_mm = 0.0
else:
    duree_vie_ans = -1 if ratio >= 1 else 0.0; prof_crit_mm = 0.0

result = {
    "success": True, "Cs": cs, "Dapp": dapp, "R2": None, "RMSE": None,
    "duree_vie_ans": float(duree_vie_ans), "profondeur_crit_mm": float(prof_crit_mm),
    "age_jours": int(age_jours), "seuil": seuil, "enrobage_mm": enrobage_mm
}
json.dumps(result)
        `);

        const fit = JSON.parse(resultJson);
        if (!fit.success) { GristHelpers.log('Erreur : ' + (fit.error || 'inconnue'), 'err'); }
        else {
          lastFitResult = fit; lastFitResult.source = 'direct';
          GristHelpers.log(`Durée de vie : ${fit.duree_vie_ans > 0 ? fit.duree_vie_ans.toFixed(1) + ' ans' : '∞'}`, 'ok');
          showResults(fit);
          document.getElementById('btn-save-direct').disabled = false;
        }
      } catch (err) { GristHelpers.log('Erreur calcul : ' + err.message, 'err'); }

      btn.disabled = false; btn.textContent = '⚙️ Calculer durée de vie';
    }

    // =========================================================================
    // SHOW RESULTS
    // =========================================================================
    function showResults(fit) {
      document.getElementById('results-card').style.display = 'block';
      const items = [
        { label: 'Cs',           value: fit.Cs   != null ? fit.Cs.toFixed(3)   : '—', unit: '% liant' },
        { label: 'Dapp',         value: GristHelpers.formatDapp(fit.Dapp),              unit: 'm²/s'   },
        { label: 'R²',           value: fit.R2   != null ? fit.R2.toFixed(4)   : '—', unit: ''        },
        { label: 'RMSE',         value: fit.RMSE != null ? fit.RMSE.toFixed(4) : '—', unit: ''        },
        { label: 'Durée de vie', value: fit.duree_vie_ans > 0 ? fit.duree_vie_ans.toFixed(1) : '∞',   unit: 'ans' },
        { label: 'Prof. critique', value: fit.profondeur_crit_mm.toFixed(1),            unit: 'mm'     },
      ];
      document.getElementById('results-info').innerHTML = items.map(f => `
        <div class="info-item">
          <div class="label">${f.label}</div>
          <div class="value">${f.value} <span class="unit">${f.unit}</span></div>
        </div>
      `).join('');
    }

    // =========================================================================
    // SAVE TO RESULT (scalar, diffusivity)
    // =========================================================================
    async function saveResults() {
      if (!lastFitResult || !currentMeasurement) { GristHelpers.log('Rien à sauvegarder', 'warn'); return; }

      const btnP = document.getElementById('btn-save');
      const btnD = document.getElementById('btn-save-direct');
      if (btnP) btnP.disabled = true;
      if (btnD) btnD.disabled = true;
      GristHelpers.log('Sauvegarde dans RESULT (scalaires diffusivité)…');

      try {
        // Find or create 'diffusivity' test
        const tests = await GristHelpers.fetchAllRecords('TEST');
        let diffTest = tests.find(t => t.fields.name === 'diffusivity');
        if (!diffTest) {
          const r = await GristHelpers.createRecord('TEST', {
            name: 'diffusivity', test_type: 'natural', standard_name: 'Fick 2nd law'
          });
          diffTest = { id: r.id };
          GristHelpers.log('Test "diffusivity" créé ✓', 'ok');
        }

        const today = Math.floor(Date.now() / 1000);
        const params = [
          { operator: 'Dapp',             value: lastFitResult.Dapp,                       unit: 'm2/s'  },
          { operator: 'Cs',               value: lastFitResult.Cs,                          unit: '%'     },
          { operator: 'R2',               value: lastFitResult.R2,                          unit: ''      },
          { operator: 'RMSE',             value: lastFitResult.RMSE,                        unit: ''      },
          { operator: 'duree_vie_ans',    value: lastFitResult.duree_vie_ans > 0 ? lastFitResult.duree_vie_ans : null, unit: 'ans' },
          { operator: 'profondeur_crit',  value: lastFitResult.profondeur_crit_mm,          unit: 'mm'    },
          { operator: 'source_dapp',      value: lastFitResult.source === 'fitting' ? 1 : 0, unit: ''     },
        ].filter(p => p.value != null);

        const records = params.map(p => ({
          id_measurement: currentMeasurement.id,
          id_test:        diffTest.id,
          result_type:    'scalar',
          name:           String(p.value),
          unit:           p.unit,
          operator:       p.operator,
          result_date:    today,
        }));

        const results = await GristHelpers.bulkCreateRecords('RESULT', records);
        GristHelpers.log(`${results.length} paramètre(s) enregistrés dans RESULT ✓`, 'ok');
      } catch (err) {
        GristHelpers.log('Erreur sauvegarde : ' + err.message, 'err');
      }

      if (btnP) btnP.disabled = false;
      if (btnD) btnD.disabled = false;
    }

    // =========================================================================
    // UI STATE
    // =========================================================================
    function updateUI() {
      const btnFit    = document.getElementById('btn-fit');
      const btnDirect = document.getElementById('btn-calc-direct');
      btnFit.disabled    = !(pyodideReady && currentProfilePoints && currentProfilePoints.length >= 3);
      btnDirect.disabled = !pyodideReady;
      if (pyodideReady && gristReady) GristHelpers.setStatus('Prêt', 'ready');
      else if (pyodideReady) GristHelpers.setStatus('Pyodide OK — en attente Grist…', '');
    }

    // =========================================================================
    // INIT
    // =========================================================================
    (async function() {
      GristHelpers.log('Initialisation Analyse Fick…');
      initGrist();
      await GristHelpers.ensureSchema();
      await initPyodide();
    })();
  </script>
</body>
