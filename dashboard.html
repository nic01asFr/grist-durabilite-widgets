<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Comparatif — Durabilité</title>

  <link rel="stylesheet" href="assets/shared-styles.css">
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <script src="assets/grist-helpers.js"></script>

  <style>
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    .chart-container { width: 100%; min-height: 400px; border-radius: 8px; overflow: hidden; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th {
      text-align: left; padding: 8px 10px; background: var(--bg);
      color: var(--text-muted); font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.3px; border-bottom: 1px solid var(--surface2);
      position: sticky; top: 0;
    }
    .data-table td { padding: 6px 10px; border-bottom: 1px solid var(--surface2); font-variant-numeric: tabular-nums; }
    .data-table tr:hover td { background: var(--bg); }
  </style>
</head>
<body>

  <div class="header">
    <h1><span class="icon">📈</span> Dashboard Comparatif</h1>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn btn-secondary" onclick="loadAllData()">🔄 Rafraîchir</button>
      <div class="status" id="status">
        <span class="dot"></span>
        <span id="status-text">Chargement…</span>
      </div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="card">
    <div class="card-title">Vue d'ensemble</div>
    <div class="stats-row" id="summary-stats">
      <div class="info-item"><div class="label">Analyses D</div><div class="value">—</div></div>
      <div class="info-item"><div class="label">Mélanges</div><div class="value">—</div></div>
      <div class="info-item"><div class="label">D moyen</div><div class="value">—</div></div>
      <div class="info-item"><div class="label">Durée de vie moy.</div><div class="value">—</div></div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card">
    <div class="card-title">Filtres</div>
    <div class="filter-bar">
      <select id="filter-mix"><option value="">Tous mélanges</option></select>
      <select id="filter-exposure-type"><option value="">Tous types expo.</option></select>
      <select id="filter-exposure-nature"><option value="">Toutes natures expo.</option></select>
      <select id="filter-source"><option value="">Toutes sources</option></select>
      <button class="btn btn-secondary" onclick="resetFilters()">Réinitialiser</button>
    </div>
  </div>

  <!-- Charts -->
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="d-mix"    onclick="showTab('d-mix')">D par mélange</div>
      <div class="tab"        data-tab="wl-d"     onclick="showTab('wl-d')">E/C vs D</div>
      <div class="tab"        data-tab="duree-vie" onclick="showTab('duree-vie')">Durée de vie</div>
    </div>
    <div id="tab-d-mix"    class="tab-content active"><div id="chart-d-mix"    class="chart-container"></div></div>
    <div id="tab-wl-d"     class="tab-content">       <div id="chart-wl-d"    class="chart-container"></div></div>
    <div id="tab-duree-vie" class="tab-content">       <div id="chart-duree-vie" class="chart-container"></div></div>
  </div>

  <!-- Data table -->
  <div class="card">
    <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
      <span>Données filtrées</span>
      <span id="table-count" style="font-size:11px; color:var(--text-dim); text-transform:none; letter-spacing:0;"></span>
    </div>
    <div style="overflow-x:auto; max-height:300px; overflow-y:auto;">
      <table class="data-table">
        <thead><tr>
          <th>Matériau</th><th>Mélange</th><th>E/C</th>
          <th>Type expo.</th><th>Nature expo.</th>
          <th>D (m²/s)</th><th>Durée vie</th><th>Source</th>
        </tr></thead>
        <tbody id="data-table-body"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Journal</div>
    <div class="log" id="log"></div>
  </div>

  <script>
    // =========================================================================
    // STATE
    // Chaque élément de allData : {
    //   _id, D, duree_vie_ans,
    //   material: {name, material_type, id_mix_design, id_exposure},
    //   mix:      {wc_ratio, …},  // liants via MIX_DESIGN_BINDER
    //   exposure: {exposure_type, exposure_nature},
    //   source:   {authors, designation, year}
    // }
    // =========================================================================
    let allData     = [];
    let filteredData = [];
    let activeTab   = 'd-mix';

    const PALETTE = [
      '#3b82f6', '#f59e0b', '#22c55e', '#ef4444', '#8b5cf6',
      '#ec4899', '#14b8a6', '#f97316', '#06b6d4', '#84cc16',
      '#e879f9', '#fb923c', '#2dd4bf', '#a78bfa', '#fbbf24'
    ];

    // =========================================================================
    // LOAD DATA
    // Architecture v2.2 :
    //   SCALAR (name='D') → MEASUREMENT → MATERIAL → MIX_DESIGN + EXPOSURE
    //   duree_vie : SCALAR name='duree_vie_ans' sur le même MEASUREMENT
    // =========================================================================
    async function loadAllData() {
      GristHelpers.log('Chargement des données…');
      GristHelpers.setStatus('Chargement…', '');

      try {
        const [scalars, measurements, materials, mixes, exposures, sources] = await Promise.all([
          GristHelpers.fetchAllRecords('SCALAR'),
          GristHelpers.fetchAllRecords('MEASUREMENT'),
          GristHelpers.fetchAllRecords('MATERIAL'),
          GristHelpers.fetchAllRecords('MIX_DESIGN'),
          GristHelpers.fetchAllRecords('EXPOSURE'),
          GristHelpers.fetchAllRecords('SOURCE'),
        ]);

        // Lookup maps
        const measureMap  = new Map(measurements.map(m => [m.id, m.fields]));
        const materialMap = new Map(materials.map(m => [m.id, m.fields]));
        const mixMap      = new Map(mixes.map(m => [m.id, m.fields]));
        const exposureMap = new Map(exposures.map(e => [e.id, e.fields]));
        const sourceMap   = new Map(sources.map(s => [s.id, s.fields]));

        // Duree de vie : SCALAR name='duree_vie_ans', groupé par id_measurement
        const dureeMap = new Map();
        scalars.forEach(s => {
          if (s.fields.name === 'duree_vie_ans' && s.fields.value != null) {
            dureeMap.set(s.fields.id_measurement, s.fields.value);
          }
        });

        // Scalaires D (coefficient de diffusion apparent)
        const dScalars = scalars.filter(s =>
          s.fields.name === 'D' &&
          s.fields.value != null &&
          s.fields.value > 0
        );

        allData = dScalars.map(s => {
          const measure  = measureMap.get(s.fields.id_measurement)  || {};
          const material = materialMap.get(measure.id_material)     || {};
          const mix      = mixMap.get(material.id_mix_design)       || {};
          const exposure = exposureMap.get(material.id_exposure)    || {};
          const source   = sourceMap.get(measure.id_source)        || {};
          return {
            _id:           s.id,
            D:             s.fields.value,
            duree_vie_ans: dureeMap.get(s.fields.id_measurement) || null,
            material,
            mix,
            exposure,
            source,
          };
        });

        GristHelpers.log(`${allData.length} valeurs D chargées (${mixes.length} mélanges, ${exposures.length} expositions)`, 'ok');

        populateFilters(allData);
        applyFilters();
        GristHelpers.setStatus(`${allData.length} analyses`, 'ready');
      } catch (err) {
        GristHelpers.log('Erreur chargement : ' + err.message, 'err');
        GristHelpers.setStatus('Erreur', 'error');
      }
    }

    // =========================================================================
    // FILTERS
    // =========================================================================
    function populateFilters(data) {
      const matNames    = [...new Set(data.map(d => d.material.name).filter(Boolean))].sort();
      const expoTypes   = [...new Set(data.map(d => d.exposure.exposure_type).filter(Boolean))].sort();
      const expoNatures = [...new Set(data.map(d => d.exposure.exposure_nature).filter(Boolean))].sort();
      const srcLabels   = [...new Set(data.map(d => sourceLabel(d.source)).filter(Boolean))].sort();

      fillSelect('filter-mix',            matNames,    'Tous matériaux');
      fillSelect('filter-exposure-type',  expoTypes,   'Tous types expo.');
      fillSelect('filter-exposure-nature',expoNatures, 'Toutes natures');
      fillSelect('filter-source',         srcLabels,   'Toutes sources');
    }

    function sourceLabel(source) {
      if (!source) return null;
      return source.designation || source.authors || null;
    }

    function fillSelect(id, values, defaultText) {
      const sel = document.getElementById(id);
      sel.innerHTML = `<option value="">${defaultText}</option>`;
      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        sel.appendChild(opt);
      });
      sel.onchange = applyFilters;
    }

    function applyFilters() {
      const matFilter    = document.getElementById('filter-mix').value;
      const expoType     = document.getElementById('filter-exposure-type').value;
      const expoNature   = document.getElementById('filter-exposure-nature').value;
      const sourceFilter = document.getElementById('filter-source').value;

      filteredData = allData.filter(d => {
        if (matFilter    && d.material.name              !== matFilter)  return false;
        if (expoType     && d.exposure.exposure_type     !== expoType)   return false;
        if (expoNature   && d.exposure.exposure_nature   !== expoNature) return false;
        if (sourceFilter && sourceLabel(d.source)        !== sourceFilter) return false;
        return true;
      });

      GristHelpers.log(`${filteredData.length}/${allData.length} analyses après filtrage`);
      updateSummary(filteredData);
      renderActiveChart();
      renderDataTable(filteredData);
    }

    function resetFilters() {
      ['filter-mix', 'filter-exposure-type', 'filter-exposure-nature', 'filter-source']
        .forEach(id => { document.getElementById(id).value = ''; });
      applyFilters();
    }

    // =========================================================================
    // TABS
    // =========================================================================
    function showTab(tabName) {
      activeTab = tabName;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tabName));
      renderActiveChart();
    }

    function renderActiveChart() {
      switch (activeTab) {
        case 'd-mix':    renderDByMix(filteredData);   break;
        case 'wl-d':     renderWlVsD(filteredData);    break;
        case 'duree-vie': renderDureeVie(filteredData); break;
      }
    }

    // =========================================================================
    // SUMMARY STATS
    // =========================================================================
    function updateSummary(data) {
      const mixIds   = new Set(data.map(d => d.material.id_mix_design).filter(Boolean));
      const dVals    = data.map(d => d.D).filter(v => v != null && v > 0);
      const dMoyen   = dVals.length > 0 ? dVals.reduce((a, b) => a + b, 0) / dVals.length : null;
      const dureeVies = data.map(d => d.duree_vie_ans).filter(v => v != null && v > 0);
      const dureeMoy  = dureeVies.length > 0 ? dureeVies.reduce((a, b) => a + b, 0) / dureeVies.length : null;

      document.getElementById('summary-stats').innerHTML = `
        <div class="info-item"><div class="label">Analyses D</div><div class="value">${data.length}</div></div>
        <div class="info-item"><div class="label">Mélanges</div><div class="value">${mixIds.size}</div></div>
        <div class="info-item"><div class="label">D moyen</div><div class="value">${dMoyen ? GristHelpers.formatDapp(dMoyen) : '—'} <span class="unit">m²/s</span></div></div>
        <div class="info-item"><div class="label">Durée de vie moy.</div><div class="value">${dureeMoy ? dureeMoy.toFixed(1) : '—'} <span class="unit">ans</span></div></div>
      `;
    }

    // =========================================================================
    // CHART 1 : D par matériau (box plots)
    // =========================================================================
    function renderDByMix(data) {
      const groups = {};
      data.forEach(d => {
        const key = d.material.name || `mix_${d.material.id_mix_design}` || 'Inconnu';
        if (!groups[key]) groups[key] = [];
        if (d.D > 0) groups[key].push(d.D);
      });

      const names  = Object.keys(groups).sort();
      const traces = names.map((name, i) => ({
        y: groups[name], type: 'box', name,
        marker: { color: PALETTE[i % PALETTE.length] },
        boxpoints: 'all', jitter: 0.3, pointpos: -1.5
      }));

      Plotly.newPlot('chart-d-mix', traces, GristHelpers.plotlyDarkLayout({
        yaxis: GristHelpers.plotlyDarkAxis('D (m²/s)'),
        xaxis: GristHelpers.plotlyDarkAxis(''),
        showlegend: false
      }), { responsive: true, displaylogo: false });
    }

    // =========================================================================
    // CHART 2 : E/C vs D (scatter)
    // =========================================================================
    function renderWlVsD(data) {
      const valid = data.filter(d => d.mix.wc_ratio != null && d.D > 0);

      if (valid.length === 0) {
        Plotly.purge('chart-wl-d');
        document.getElementById('chart-wl-d').innerHTML =
          '<div class="empty-state" style="padding:40px"><h3>Pas de données E/C</h3><p>Renseignez <strong>wc_ratio</strong> dans MIX_DESIGN.</p></div>';
        return;
      }

      const matNames = [...new Set(valid.map(d => d.material.name || 'Inconnu'))].sort();
      const traces = matNames.map((name, i) => {
        const pts = valid.filter(d => (d.material.name || 'Inconnu') === name);
        return {
          x: pts.map(d => d.mix.wc_ratio), y: pts.map(d => d.D),
          mode: 'markers', type: 'scatter', name,
          marker: { color: PALETTE[i % PALETTE.length], size: 10, line: { color: 'rgba(255,255,255,0.3)', width: 1 } },
          text: pts.map(d => `${d.material.name || '?'}<br>D: ${GristHelpers.formatDapp(d.D)}`)
        };
      });

      Plotly.newPlot('chart-wl-d', traces, GristHelpers.plotlyDarkLayout({
        xaxis: GristHelpers.plotlyDarkAxis('Rapport E/C'),
        yaxis: GristHelpers.plotlyDarkAxis('D (m²/s)')
      }), { responsive: true, displaylogo: false });
    }

    // =========================================================================
    // CHART 3 : Durée de vie (bar chart)
    // =========================================================================
    function renderDureeVie(data) {
      const groups = {};
      data.forEach(d => {
        const key = d.material.name || 'Inconnu';
        if (!groups[key]) groups[key] = [];
        if (d.duree_vie_ans != null && d.duree_vie_ans > 0) groups[key].push(d.duree_vie_ans);
      });

      const names = Object.keys(groups).filter(k => groups[k].length > 0).sort();
      if (names.length === 0) {
        Plotly.purge('chart-duree-vie');
        document.getElementById('chart-duree-vie').innerHTML =
          '<div class="empty-state" style="padding:40px"><h3>Pas de données</h3><p>Enregistrez un scalaire <strong>duree_vie_ans</strong> dans SCALAR.</p></div>';
        return;
      }

      const means  = names.map(n => { const v = groups[n]; return v.reduce((a, b) => a + b, 0) / v.length; });
      const mins   = names.map(n => Math.min(...groups[n]));
      const maxs   = names.map(n => Math.max(...groups[n]));
      const counts = names.map(n => groups[n].length);

      Plotly.newPlot('chart-duree-vie', [{
        x: names, y: means, type: 'bar', name: 'Moyenne',
        marker: { color: names.map((_, i) => PALETTE[i % PALETTE.length]) },
        error_y: {
          type: 'data', symmetric: false,
          array:      maxs.map((m, i) => m - means[i]),
          arrayminus: means.map((m, i) => m - mins[i]),
          color: '#94a3b8', thickness: 1.5
        },
        text:      counts.map((c, i) => `n=${c}, moy=${means[i].toFixed(1)} ans`),
        hoverinfo: 'text+name'
      }], GristHelpers.plotlyDarkLayout({
        xaxis:      GristHelpers.plotlyDarkAxis(''),
        yaxis:      GristHelpers.plotlyDarkAxis('Durée de vie (ans)'),
        showlegend: false
      }), { responsive: true, displaylogo: false });
    }

    // =========================================================================
    // DATA TABLE
    // =========================================================================
    function renderDataTable(data) {
      document.getElementById('table-count').textContent = `${data.length} lignes`;
      document.getElementById('data-table-body').innerHTML = data.map(d => `
        <tr>
          <td>${d.material.name           || '—'}</td>
          <td>${d.material.id_mix_design  ? `mix#${d.material.id_mix_design}` : '—'}</td>
          <td>${d.mix.wc_ratio != null    ? d.mix.wc_ratio.toFixed(2) : '—'}</td>
          <td>${d.exposure.exposure_type  || '—'}</td>
          <td>${d.exposure.exposure_nature|| '—'}</td>
          <td>${GristHelpers.formatDapp(d.D)}</td>
          <td>${d.duree_vie_ans != null && d.duree_vie_ans > 0 ? d.duree_vie_ans.toFixed(1) : '—'}</td>
          <td>${sourceLabel(d.source)     || '—'}</td>
        </tr>
      `).join('');
    }

    // =========================================================================
    // INIT
    // =========================================================================
    (async function() {
      GristHelpers.log('Initialisation Dashboard Comparatif…');
      grist.ready({ requiredAccess: 'full' });
      GristHelpers.log('Connecté à Grist ✓', 'ok');
      await GristHelpers.ensureSchema();
      loadAllData();
    })();
  </script>
</body>
</html>
